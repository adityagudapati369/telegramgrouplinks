<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Learn to Fly 2 - Play Online | Groupverse</title>
  <meta name="description" content="Play Learn to Fly 2 online free — a classic Flash game, now playable in your browser via Ruffle emulator.">

  <!-- Ruffle: makes .swf Flash files playable in modern browsers -->
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: sans-serif;
      color: #fff;
      -webkit-user-select: none;
      user-select: none;
    }
    h1 { margin: 20px 0 10px; }
    #game-container {
      width: 800px;
      max-width: 95vw;
      aspect-ratio: 4 / 3;
      background: #000;
      border: 2px solid #333;
      touch-action: none;
    }
    ruffle-player {
      width: 100%;
      height: 100%;
    }

    #touch-controls {
      display: none;
      width: 800px;
      max-width: 95vw;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      padding: 0 10px;
      gap: 10px;
    }
    .tc-group { display: flex; gap: 10px; }
    .tc-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #2a2a2a;
      border: 2px solid #555;
      color: #fff;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }
    .tc-btn:active { background: #ff512f; border-color: #ff512f; }
    .tc-action { width: 74px; height: 74px; font-size: 13px; font-weight: bold; }
    @media (hover: none) and (pointer: coarse) { #touch-controls { display: flex; } }
  </style>
</head>
<body>
  <h1>Learn to Fly 2</h1>
  <div id="game-container">
    <embed src="learn-2-fly.swf" width="100%" height="100%">
  </div>

  <div id="touch-controls">
    <div class="tc-group">
      <button class="tc-btn" id="tc-up">▲</button>
      <button class="tc-btn" id="tc-down">▼</button>
    </div>
    <div class="tc-group">
      <button class="tc-btn tc-action" id="tc-space">BOOST</button>
    </div>
  </div>

  <p style="max-width:600px;text-align:center;color:#aaa;font-size:14px;margin-top:14px;">
    This game runs via the Ruffle Flash emulator since Adobe Flash Player was discontinued in 2020.
    Tap and drag on the ramp to launch, then use the arrows to tilt in the air and BOOST for your rocket/glider power-ups.
  </p>

  <script>

    function fireKey(type, code, key, keyCode) {
      const target = document.querySelector('ruffle-player') || document;
      const event = new KeyboardEvent(type, {
        code: code, key: key, keyCode: keyCode, which: keyCode,
        bubbles: true, cancelable: true
      });
      target.dispatchEvent(event);
      window.dispatchEvent(event);
      document.dispatchEvent(event);
    }
    function bindHoldButton(id, code, key, keyCode) {
      const btn = document.getElementById(id);
      if (!btn) return;
      const press = (e) => { e.preventDefault(); fireKey('keydown', code, key, keyCode); };
      const release = (e) => { e.preventDefault(); fireKey('keyup', code, key, keyCode); };
      btn.addEventListener('touchstart', press, { passive: false });
      btn.addEventListener('touchend', release, { passive: false });
      btn.addEventListener('touchcancel', release, { passive: false });
      btn.addEventListener('mousedown', press);
      btn.addEventListener('mouseup', release);
      btn.addEventListener('mouseleave', release);
    }


    bindHoldButton('tc-up', 'ArrowUp', 'ArrowUp', 38);
    bindHoldButton('tc-down', 'ArrowDown', 'ArrowDown', 40);
    bindHoldButton('tc-space', 'Space', ' ', 32);

  </script>
</body>
</html>
